version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
environmentVariables:
  - DATABASE_URL: $DATABASE_URL
  - NODE_TLS_REJECT_UNAUTHORIZED: "0"